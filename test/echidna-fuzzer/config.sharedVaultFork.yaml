# Fork-backed SharedVault Echidna config.
#
# ECHIDNA_RPC_URL must point at Base because Fuzzer.sharedVaultFork.sol uses
# Base WETH/USDC, Base Uniswap V3 NFPM, and Base V3Utils constants.
#
# Keep --rpc-block aligned with BASE_FORK_BLOCK in Fuzzer.sharedVaultFork.sol.
# After a Base shared-vault redeploy, refresh the factory/proxy constants in
# that file from contracts-shared.json and update the pinned block in both
# places before relying on fork results.

testMode: "assertion"
allContracts: false

balanceContract: 1000000000000000000000000

# Fork strategy calls are much heavier than the mock harness, so keep the
# default fork campaign smaller. Increase locally for overnight runs.
testLimit: 5000
seqLen: 40

deployer: "0x10000"

# `SharedVault`, `SharedV4Strategy`, and `SharedPancakeV4Strategy` link to external Solidity libraries
# (`SharedVaultPreviewLib`, `SharedV4StrategyLib`, and `SharedPancakeV4StrategyLib` respectively). The
# V4 strategy libraries also link to `SharedV4SwapPipeline`. Echidna's `crytic-compile` doesn't auto-link
# them, so we declare deterministic deploy addresses here; Echidna places the library bytecode at those
# slots at session start. Without these, local SharedVault / V4 strategy deployments inside the fork
# harness fail with "Unlinked libraries detected in bytecode". Mirrors the same directive used by the
# non-fork config; the addresses must stay distinct from each other and from any address the fuzzer
# touches at runtime.
cryticArgs:
  [
    "--compile-libraries=(SharedVaultPreviewLib,0x1000000000000000000000000000000000000001),(SharedV4StrategyLib,0x1000000000000000000000000000000000000002),(SharedPancakeV4StrategyLib,0x1000000000000000000000000000000000000003),(SharedV4SwapPipeline,0x1000000000000000000000000000000000000004)",
  ]
