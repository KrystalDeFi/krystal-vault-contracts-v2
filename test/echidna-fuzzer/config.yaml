# Config wiki: https://secure-contracts.com/program-analysis/echidna/configuration.html

testMode: "assertion"
allContracts: false

# allContracts: if true, all contracts in the codebase will be considered main contracts for testing
# Default: false
# guide: https://secure-contracts.com/program-analysis/echidna/advanced/using-all-contracts.html
allContracts: false

# SharedVault uses an external library. Echidna needs the library deployed and
# crytic-compile needs the same address linked into SharedVault bytecode.
deployContracts: [["0x1000000000000000000000000000000000000001", "SharedVaultPreviewLib"]]
cryticArgs: ["--compile-libraries=(SharedVaultPreviewLib,0x1000000000000000000000000000000000000001)"]

# balanceContract: balance of deployed contract in wei
balanceContract: 1000000000000000000000000
# Default: 0

# Directory to save corpus
# Default: null
# corpusDir: ".corpus"

# Number of test sequences to run
# Default: 50000
testLimit: 999999999999999999  # unlimited

deployer: "0x10000"

corpusDir: "corpus"
